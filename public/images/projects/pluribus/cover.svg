<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Pluribus, many emerald streams converging and merging into a single glowing node, while one amber stream, Carol, refuses to merge and veers away to a separate protected node">
  <defs>
    <radialGradient id="pl-bg" cx="68%" cy="52%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pl-stream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="55%" stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="pl-carol" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0a45e" stop-opacity="0"/>
      <stop offset="45%" stop-color="#e0a45e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e0a45e" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="pl-nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pl-amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0a45e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#e0a45e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="pl-grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <filter id="pl-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#141310"/>
  <rect width="1280" height="720" fill="url(#pl-grid)"/>
  <rect width="1280" height="720" fill="url(#pl-bg)"/>
  <rect x="96" y="112" width="1088" height="496" rx="26" fill="#ffffff" fill-opacity="0.015" stroke="#cdbfa3" stroke-opacity="0.16" stroke-width="1.5"/>

  <!-- emerald streams converging into one -->
  <g fill="none" stroke="url(#pl-stream)" stroke-linecap="round">
    <path d="M150 180 C 440 210 650 300 902 376" stroke-width="2.5" stroke-opacity="0.8"/>
    <path d="M150 250 C 420 275 660 345 905 380" stroke-width="3" stroke-opacity="0.95"/>
    <path d="M155 330 C 430 340 675 372 908 383" stroke-width="2.5" stroke-opacity="0.85"/>
    <path d="M150 410 C 420 405 665 398 905 386" stroke-width="3.5" stroke-opacity="1"/>
    <path d="M158 500 C 440 480 680 425 904 392" stroke-width="2.5" stroke-opacity="0.8"/>
    <path d="M150 560 C 470 530 690 445 902 396" stroke-width="2" stroke-opacity="0.6"/>
  </g>

  <!-- resonance rings at the point of convergence -->
  <g fill="none" stroke="#34d399" stroke-opacity="0.14" stroke-width="1.5">
    <circle cx="905" cy="384" r="70" stroke-dasharray="2 10"/>
    <circle cx="905" cy="384" r="120" stroke-dasharray="2 10"/>
    <circle cx="905" cy="384" r="172" stroke-dasharray="2 10"/>
  </g>

  <!-- the merged collective node -->
  <circle cx="905" cy="384" r="80" fill="url(#pl-nodeGlow)" opacity="0.55"/>
  <circle cx="905" cy="384" r="30" fill="#10b981"/>
  <circle cx="905" cy="384" r="30" fill="none" stroke="#7ff0c4" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="905" cy="384" r="13" fill="#bdf7dd"/>

  <!-- Carol: the stream that refuses to merge, veering away -->
  <path d="M150 360 C 470 360 690 372 800 344 C 884 322 905 286 986 208"
        fill="none" stroke="url(#pl-carol)" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="986" cy="206" r="64" fill="url(#pl-amberGlow)" opacity="0.55"/>
  <circle cx="986" cy="206" r="26" fill="#e0a45e"/>
  <circle cx="986" cy="206" r="38" fill="none" stroke="#e0a45e" stroke-width="2.5"/>
  <circle cx="986" cy="206" r="51" fill="none" stroke="#e0a45e" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="3 9"/>

  <!-- faint drifting particles along the field -->
  <g fill="#34d399" fill-opacity="0.5">
    <circle cx="360" cy="268" r="2.5"/><circle cx="540" cy="350" r="2"/>
    <circle cx="470" cy="455" r="2.5"/><circle cx="690" cy="360" r="2"/>
    <circle cx="300" cy="380" r="2"/><circle cx="620" cy="300" r="2.5"/>
  </g>

  <!-- corner ticks -->
  <g stroke="#34d399" stroke-opacity="0.4" stroke-width="2">
    <path d="M128 144 h24 M128 144 v24"/>
    <path d="M1152 576 h-24 M1152 576 v-24"/>
  </g>

  <rect width="1280" height="720" filter="url(#pl-grain)" opacity="0.05"/>
</svg>
