<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Pluribus, a fan of language-model agents writing into a shared latent buffer with resonance rings and cross-inhibition, while a larger amber dissenter node, Carol, sits apart behind protective rings">
  <defs>
    <radialGradient id="pl-bg" cx="50%" cy="62%" r="62%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pl-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0a45e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#e0a45e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pl-node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="pl-grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <filter id="pl-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#141310"/>
  <rect width="1280" height="720" fill="url(#pl-grid)"/>
  <rect width="1280" height="720" fill="url(#pl-bg)"/>
  <rect x="96" y="112" width="1088" height="496" rx="26" fill="#ffffff" fill-opacity="0.015" stroke="#cdbfa3" stroke-opacity="0.16" stroke-width="1.5"/>

  <!-- resonance rings rising from the buffer -->
  <g fill="none" stroke="#34d399" stroke-opacity="0.16" stroke-width="1.5">
    <ellipse cx="640" cy="502" rx="150" ry="92" stroke-dasharray="2 10"/>
    <ellipse cx="640" cy="502" rx="240" ry="150" stroke-dasharray="2 10"/>
    <ellipse cx="640" cy="502" rx="330" ry="208" stroke-dasharray="2 10"/>
  </g>

  <!-- write lines from agents into the buffer -->
  <g stroke="#34d399" stroke-width="2" stroke-opacity="0.4" fill="#34d399">
    <line x1="395" y1="300" x2="500" y2="470"/>
    <line x1="517" y1="243" x2="575" y2="470"/>
    <line x1="640" y1="222" x2="640" y2="470"/>
    <line x1="763" y1="243" x2="705" y2="470"/>
    <line x1="885" y1="300" x2="780" y2="470"/>
    <g fill-opacity="0.7">
      <polygon points="494,462 506,462 500,472"/>
      <polygon points="569,462 581,462 575,472"/>
      <polygon points="634,462 646,462 640,472"/>
      <polygon points="699,462 711,462 705,472"/>
      <polygon points="774,462 786,462 780,472"/>
    </g>
  </g>

  <!-- arc mesh between agents, with cross-inhibition stop-signals -->
  <g stroke="#34d399" stroke-width="2" stroke-opacity="0.36">
    <line x1="395" y1="300" x2="517" y2="243"/>
    <line x1="517" y1="243" x2="640" y2="222"/>
    <line x1="640" y1="222" x2="763" y2="243"/>
    <line x1="763" y1="243" x2="885" y2="300"/>
  </g>
  <g stroke="#34d399" stroke-width="4" stroke-linecap="round" stroke-opacity="0.85">
    <line x1="571" y1="226" x2="585" y2="240"/>
    <line x1="695" y1="226" x2="709" y2="240"/>
  </g>

  <!-- shared latent buffer -->
  <ellipse cx="640" cy="502" rx="230" ry="60" fill="url(#pl-bg)"/>
  <rect x="440" y="472" width="400" height="60" rx="14" fill="#10b981" fill-opacity="0.08" stroke="#34d399" stroke-opacity="0.55" stroke-width="2"/>
  <g stroke="#34d399" stroke-opacity="0.22" stroke-width="1.5">
    <line x1="490" y1="480" x2="490" y2="524"/><line x1="540" y1="480" x2="540" y2="524"/>
    <line x1="590" y1="480" x2="590" y2="524"/><line x1="640" y1="480" x2="640" y2="524"/>
    <line x1="690" y1="480" x2="690" y2="524"/><line x1="740" y1="480" x2="740" y2="524"/>
    <line x1="790" y1="480" x2="790" y2="524"/>
  </g>
  <g fill="#34d399" fill-opacity="0.6">
    <rect x="498" y="486" width="34" height="32" rx="5"/>
    <rect x="598" y="486" width="34" height="32" rx="5"/>
    <rect x="648" y="486" width="34" height="32" rx="5"/>
    <rect x="748" y="486" width="34" height="32" rx="5"/>
  </g>

  <!-- agents -->
  <g>
    <circle cx="395" cy="300" r="34" fill="url(#pl-node)"/>
    <circle cx="517" cy="243" r="34" fill="url(#pl-node)"/>
    <circle cx="640" cy="222" r="34" fill="url(#pl-node)"/>
    <circle cx="763" cy="243" r="34" fill="url(#pl-node)"/>
    <circle cx="885" cy="300" r="34" fill="url(#pl-node)"/>
    <g fill="none" stroke="#34d399" stroke-opacity="0.55" stroke-width="2">
      <circle cx="395" cy="300" r="22"/><circle cx="517" cy="243" r="22"/>
      <circle cx="640" cy="222" r="22"/><circle cx="763" cy="243" r="22"/><circle cx="885" cy="300" r="22"/>
    </g>
    <g fill="#10b981">
      <circle cx="395" cy="300" r="13"/><circle cx="517" cy="243" r="13"/>
      <circle cx="640" cy="222" r="13"/><circle cx="763" cy="243" r="13"/><circle cx="885" cy="300" r="13"/>
    </g>
  </g>

  <!-- Carol: the protected dissenter, set apart -->
  <g>
    <line x1="1006" y1="398" x2="800" y2="488" stroke="#e0a45e" stroke-width="2" stroke-opacity="0.45"/>
    <!-- majority inhibition aimed at Carol, stopped at her shield -->
    <g stroke="#e0a45e" stroke-opacity="0.7" stroke-width="2.5">
      <line x1="885" y1="300" x2="968" y2="372"/>
      <line x1="763" y1="243" x2="966" y2="356"/>
      <line x1="956" y1="360" x2="978" y2="350" stroke-width="4" stroke-linecap="round"/>
      <line x1="958" y1="384" x2="980" y2="376" stroke-width="4" stroke-linecap="round"/>
    </g>
    <circle cx="1006" cy="398" r="70" fill="url(#pl-amber)" opacity="0.5"/>
    <circle cx="1006" cy="398" r="31" fill="#e0a45e"/>
    <circle cx="1006" cy="398" r="43" fill="none" stroke="#e0a45e" stroke-width="2.5"/>
    <circle cx="1006" cy="398" r="57" fill="none" stroke="#e0a45e" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="3 9"/>
  </g>

  <!-- corner ticks -->
  <g stroke="#34d399" stroke-opacity="0.4" stroke-width="2">
    <path d="M128 144 h24 M128 144 v24"/>
    <path d="M1152 576 h-24 M1152 576 v-24"/>
  </g>

  <rect width="1280" height="720" filter="url(#pl-grain)" opacity="0.05"/>
</svg>
