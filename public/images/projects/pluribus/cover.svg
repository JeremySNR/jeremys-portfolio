<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Pluribus, an arc of language-model agents writing to a shared latent buffer, with stop-signal cross-inhibition and a larger amber dissenter node, Carol, protected by rings">
  <defs>
    <radialGradient id="p-glow" cx="50%" cy="36%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="p-glow2" cx="55%" cy="52%" r="26%">
      <stop offset="0%" stop-color="#e0a45e" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#e0a45e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="p-grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <filter id="p-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <filter id="p-soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#141310"/>
  <rect width="1280" height="720" fill="url(#p-grid)"/>
  <rect width="1280" height="720" fill="url(#p-glow)"/>
  <rect width="1280" height="720" fill="url(#p-glow2)"/>

  <rect x="96" y="112" width="1088" height="496" rx="26" fill="#ffffff" fill-opacity="0.015" stroke="#cdbfa3" stroke-opacity="0.16" stroke-width="1.5"/>

  <!-- agent-to-buffer write lines -->
  <g stroke="#34d399" stroke-width="2" stroke-opacity="0.4">
    <line x1="360" y1="255" x2="440" y2="470"/>
    <line x1="500" y1="200" x2="540" y2="470"/>
    <line x1="640" y1="182" x2="640" y2="470"/>
    <line x1="780" y1="200" x2="740" y2="470"/>
    <line x1="920" y1="255" x2="840" y2="470"/>
  </g>

  <!-- arc edges between agents -->
  <g stroke="#34d399" stroke-width="2" stroke-opacity="0.38">
    <line x1="360" y1="255" x2="500" y2="200"/>
    <line x1="500" y1="200" x2="640" y2="182"/>
    <line x1="640" y1="182" x2="780" y2="200"/>
    <line x1="780" y1="200" x2="920" y2="255"/>
  </g>
  <!-- cross-inhibition stop-signals on two arc edges -->
  <g stroke="#34d399" stroke-width="4" stroke-linecap="round" stroke-opacity="0.85">
    <line x1="563" y1="184" x2="577" y2="198"/>
    <line x1="703" y1="184" x2="717" y2="198"/>
  </g>

  <!-- shared latent buffer panel -->
  <g>
    <rect x="390" y="470" width="500" height="72" rx="16" fill="#10b981" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.5" stroke-width="2"/>
    <g stroke="#34d399" stroke-opacity="0.25" stroke-width="1.5">
      <line x1="460" y1="478" x2="460" y2="534"/><line x1="530" y1="478" x2="530" y2="534"/>
      <line x1="600" y1="478" x2="600" y2="534"/><line x1="670" y1="478" x2="670" y2="534"/>
      <line x1="740" y1="478" x2="740" y2="534"/><line x1="810" y1="478" x2="810" y2="534"/>
    </g>
    <g fill="#34d399" fill-opacity="0.55">
      <rect x="468" y="486" width="54" height="40" rx="5"/>
      <rect x="608" y="486" width="54" height="40" rx="5"/>
      <rect x="748" y="486" width="54" height="40" rx="5"/>
    </g>
  </g>

  <!-- agents -->
  <g>
    <g fill="#10b981">
      <circle cx="360" cy="255" r="17"/><circle cx="500" cy="200" r="17"/>
      <circle cx="640" cy="182" r="17"/><circle cx="780" cy="200" r="17"/><circle cx="920" cy="255" r="17"/>
    </g>
    <g fill="none" stroke="#34d399" stroke-opacity="0.5" stroke-width="2">
      <circle cx="360" cy="255" r="26"/><circle cx="500" cy="200" r="26"/>
      <circle cx="640" cy="182" r="26"/><circle cx="780" cy="200" r="26"/><circle cx="920" cy="255" r="26"/>
    </g>
  </g>

  <!-- Carol: protected dissenter -->
  <g>
    <line x1="700" y1="372" x2="700" y2="470" stroke="#e0a45e" stroke-width="2" stroke-opacity="0.5"/>
    <!-- inhibition arrows that stop at Carol's ring -->
    <g stroke="#e0a45e" stroke-opacity="0.75" stroke-width="2.5">
      <line x1="640" y1="182" x2="690" y2="318"/>
      <line x1="780" y1="200" x2="744" y2="334"/>
      <line x1="676" y1="300" x2="700" y2="306" stroke-width="4" stroke-linecap="round"/>
      <line x1="752" y1="318" x2="730" y2="330" stroke-width="4" stroke-linecap="round"/>
    </g>
    <circle cx="700" cy="372" r="46" fill="#e0a45e" filter="url(#p-soft)" opacity="0.3"/>
    <circle cx="700" cy="372" r="31" fill="#e0a45e"/>
    <circle cx="700" cy="372" r="43" fill="none" stroke="#e0a45e" stroke-width="2.5" stroke-opacity="0.9"/>
    <circle cx="700" cy="372" r="56" fill="none" stroke="#e0a45e" stroke-width="1.5" stroke-opacity="0.45" stroke-dasharray="3 9"/>
  </g>

  <!-- corner ticks -->
  <g stroke="#34d399" stroke-opacity="0.4" stroke-width="2">
    <path d="M128 144 h24 M128 144 v24"/>
    <path d="M1152 576 h-24 M1152 576 v-24"/>
  </g>

  <rect width="1280" height="720" filter="url(#p-grain)" opacity="0.05"/>
</svg>
