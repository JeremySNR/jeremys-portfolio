<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="ClipForge, a long video timeline with one highlighted moment lifted out into a vertical clip with captions and a virality score">
  <defs>
    <radialGradient id="cf-glow" cx="62%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cf-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#1f9e6c"/>
    </linearGradient>
    <linearGradient id="cf-phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.015"/>
    </linearGradient>
    <pattern id="cf-grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="#141310"/>
  <rect width="1280" height="720" fill="url(#cf-grid)"/>
  <rect width="1280" height="720" fill="url(#cf-glow)"/>

  <!-- backdrop panel -->
  <rect x="96" y="96" width="1088" height="528" rx="26" fill="#ffffff" fill-opacity="0.015" stroke="#cdbfa3" stroke-opacity="0.16" stroke-width="1.5"/>

  <!-- long-video timeline: waveform strip -->
  <g>
    <rect x="152" y="452" width="800" height="96" rx="14" fill="#ffffff" fill-opacity="0.02" stroke="#cdbfa3" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- waveform bars, muted -->
    <g fill="#cdbfa3" fill-opacity="0.32">
      <rect x="176" y="486" width="8" height="28" rx="4"/>
      <rect x="192" y="478" width="8" height="44" rx="4"/>
      <rect x="208" y="492" width="8" height="16" rx="4"/>
      <rect x="224" y="482" width="8" height="36" rx="4"/>
      <rect x="240" y="474" width="8" height="52" rx="4"/>
      <rect x="256" y="488" width="8" height="24" rx="4"/>
      <rect x="272" y="480" width="8" height="40" rx="4"/>
      <rect x="288" y="493" width="8" height="14" rx="4"/>
      <rect x="304" y="483" width="8" height="34" rx="4"/>
      <rect x="320" y="476" width="8" height="48" rx="4"/>
      <rect x="336" y="489" width="8" height="22" rx="4"/>
      <rect x="352" y="481" width="8" height="38" rx="4"/>
      <rect x="368" y="491" width="8" height="18" rx="4"/>
      <rect x="384" y="479" width="8" height="42" rx="4"/>
    </g>
    <!-- highlighted viral segment -->
    <rect x="408" y="462" width="188" height="76" rx="10" fill="#10b981" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.85" stroke-width="2"/>
    <g fill="url(#cf-bar)">
      <rect x="424" y="474" width="9" height="52" rx="4.5"/>
      <rect x="442" y="466" width="9" height="68" rx="4.5"/>
      <rect x="460" y="480" width="9" height="40" rx="4.5"/>
      <rect x="478" y="470" width="9" height="60" rx="4.5"/>
      <rect x="496" y="462" width="9" height="76" rx="4.5"/>
      <rect x="514" y="476" width="9" height="48" rx="4.5"/>
      <rect x="532" y="468" width="9" height="64" rx="4.5"/>
      <rect x="550" y="482" width="9" height="36" rx="4.5"/>
      <rect x="568" y="472" width="9" height="56" rx="4.5"/>
    </g>
    <!-- waveform continues, muted -->
    <g fill="#cdbfa3" fill-opacity="0.32">
      <rect x="616" y="486" width="8" height="28" rx="4"/>
      <rect x="632" y="479" width="8" height="42" rx="4"/>
      <rect x="648" y="491" width="8" height="18" rx="4"/>
      <rect x="664" y="483" width="8" height="34" rx="4"/>
      <rect x="680" y="475" width="8" height="50" rx="4"/>
      <rect x="696" y="489" width="8" height="22" rx="4"/>
      <rect x="712" y="481" width="8" height="38" rx="4"/>
      <rect x="728" y="492" width="8" height="16" rx="4"/>
      <rect x="744" y="484" width="8" height="32" rx="4"/>
      <rect x="760" y="477" width="8" height="46" rx="4"/>
      <rect x="776" y="490" width="8" height="20" rx="4"/>
      <rect x="792" y="482" width="8" height="36" rx="4"/>
      <rect x="808" y="493" width="8" height="14" rx="4"/>
      <rect x="824" y="485" width="8" height="30" rx="4"/>
      <rect x="840" y="478" width="8" height="44" rx="4"/>
      <rect x="856" y="490" width="8" height="20" rx="4"/>
      <rect x="872" y="483" width="8" height="34" rx="4"/>
      <rect x="888" y="492" width="8" height="16" rx="4"/>
      <rect x="904" y="486" width="8" height="28" rx="4"/>
      <rect x="920" y="480" width="8" height="40" rx="4"/>
    </g>
    <!-- timecode ticks -->
    <g stroke="#cdbfa3" stroke-opacity="0.25" stroke-width="1.5">
      <line x1="152" y1="568" x2="152" y2="578"/>
      <line x1="352" y1="568" x2="352" y2="578"/>
      <line x1="552" y1="568" x2="552" y2="578"/>
      <line x1="752" y1="568" x2="752" y2="578"/>
      <line x1="952" y1="568" x2="952" y2="578"/>
    </g>
    <line x1="152" y1="573" x2="952" y2="573" stroke="#cdbfa3" stroke-opacity="0.18" stroke-width="1.5"/>
  </g>

  <!-- extraction lines from highlighted segment up to the phone -->
  <g stroke="#34d399" stroke-opacity="0.5" stroke-width="1.75" fill="none">
    <path d="M 452 462 C 470 330, 700 300, 872 264"/>
    <path d="M 596 470 C 680 400, 800 360, 872 330"/>
  </g>
  <circle cx="452" cy="462" r="4" fill="#34d399"/>
  <circle cx="596" cy="470" r="4" fill="#34d399"/>

  <!-- vertical 9:16 clip frame -->
  <g>
    <rect x="872" y="148" width="212" height="376" rx="24" fill="url(#cf-phone)" stroke="#34d399" stroke-opacity="0.8" stroke-width="2"/>
    <!-- speaker crop: head-and-shoulders silhouette -->
    <circle cx="978" cy="278" r="38" fill="#cdbfa3" fill-opacity="0.28"/>
    <path d="M 916 398 C 916 344, 1040 344, 1040 398 L 1040 400 L 916 400 Z" fill="#cdbfa3" fill-opacity="0.28"/>
    <!-- active-speaker focus corners -->
    <g stroke="#34d399" stroke-opacity="0.9" stroke-width="2.5" fill="none">
      <path d="M 928 232 h -16 v 16"/>
      <path d="M 1028 232 h 16 v 16"/>
      <path d="M 928 412 h -16 v -16"/>
      <path d="M 1028 412 h 16 v -16"/>
    </g>
    <!-- karaoke caption bars: one word lit -->
    <g>
      <rect x="906" y="440" width="52" height="14" rx="7" fill="#cdbfa3" fill-opacity="0.35"/>
      <rect x="966" y="440" width="44" height="14" rx="7" fill="url(#cf-bar)"/>
      <rect x="1018" y="440" width="34" height="14" rx="7" fill="#cdbfa3" fill-opacity="0.35"/>
      <rect x="930" y="464" width="42" height="14" rx="7" fill="#cdbfa3" fill-opacity="0.35"/>
      <rect x="980" y="464" width="52" height="14" rx="7" fill="#cdbfa3" fill-opacity="0.35"/>
    </g>
    <!-- play button -->
    <circle cx="978" cy="330" r="26" fill="#10b981" fill-opacity="0.18" stroke="#34d399" stroke-opacity="0.9" stroke-width="2"/>
    <path d="M 970 318 L 992 330 L 970 342 Z" fill="#34d399"/>
  </g>

  <!-- virality score chip -->
  <g>
    <rect x="1040" y="128" width="88" height="40" rx="20" fill="#141310" stroke="#34d399" stroke-width="2"/>
    <circle cx="1064" cy="148" r="9" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <path d="M 1064 143 v 5 l 4 3" stroke="#34d399" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="1084" y="155" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" font-weight="700" fill="#34d399">87</text>
  </g>

  <!-- wordmark -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="152" y="176" font-size="30" font-weight="700" fill="#e8e3d8" letter-spacing="1">ClipForge</text>
    <text x="152" y="212" font-size="17" fill="#cdbfa3" fill-opacity="0.75" letter-spacing="0.5">long video in, viral clips out</text>
  </g>
</svg>
