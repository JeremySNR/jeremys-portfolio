<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="snug, a token budget gauge above prioritised content blocks packed to fit, with lower-priority blocks dropped beyond the limit">
  <defs>
    <radialGradient id="s-glow" cx="42%" cy="44%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#1f9e6c"/>
    </linearGradient>
    <pattern id="s-grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <filter id="s-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#141310"/>
  <rect width="1280" height="720" fill="url(#s-grid)"/>
  <rect width="1280" height="720" fill="url(#s-glow)"/>

  <!-- dashboard backdrop panel -->
  <rect x="96" y="112" width="1088" height="496" rx="26" fill="#ffffff" fill-opacity="0.015" stroke="#cdbfa3" stroke-opacity="0.16" stroke-width="1.5"/>

  <!-- budget gauge with tick scale -->
  <g>
    <g stroke="#cdbfa3" stroke-opacity="0.3" stroke-width="2">
      <line x1="200" y1="150" x2="200" y2="162"/><line x1="268" y1="152" x2="268" y2="162"/>
      <line x1="336" y1="152" x2="336" y2="162"/><line x1="404" y1="152" x2="404" y2="162"/>
      <line x1="472" y1="152" x2="472" y2="162"/><line x1="540" y1="152" x2="540" y2="162"/>
      <line x1="608" y1="152" x2="608" y2="162"/><line x1="676" y1="152" x2="676" y2="162"/>
      <line x1="744" y1="152" x2="744" y2="162"/><line x1="812" y1="152" x2="812" y2="162"/>
      <line x1="880" y1="150" x2="880" y2="162"/>
    </g>
    <rect x="200" y="168" width="680" height="20" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#cdbfa3" stroke-opacity="0.25"/>
    <rect x="200" y="168" width="512" height="20" rx="10" fill="url(#s-bar)"/>
    <polygon points="872,148 888,148 880,160" fill="#34d399"/>
  </g>

  <!-- budget container -->
  <rect x="200" y="228" width="680" height="322" rx="16" fill="#ffffff" fill-opacity="0.02" stroke="#cdbfa3" stroke-opacity="0.45" stroke-width="2"/>

  <!-- budget limit -->
  <line x1="880" y1="205" x2="880" y2="575" stroke="#34d399" stroke-width="2.5" stroke-dasharray="6 8"/>
  <circle cx="880" cy="205" r="5" fill="#34d399"/>

  <!-- priority dots (included) -->
  <g fill="#34d399">
    <circle cx="252" cy="254" r="6" fill-opacity="0.95"/><circle cx="312" cy="254" r="6" fill-opacity="0.9"/>
    <circle cx="372" cy="254" r="6" fill-opacity="0.85"/><circle cx="432" cy="254" r="6" fill-opacity="0.8"/>
    <circle cx="492" cy="254" r="6" fill-opacity="0.72"/><circle cx="552" cy="254" r="6" fill-opacity="0.66"/>
    <circle cx="612" cy="254" r="6" fill-opacity="0.6"/><circle cx="672" cy="254" r="6" fill-opacity="0.54"/>
    <circle cx="732" cy="254" r="6" fill-opacity="0.48"/><circle cx="792" cy="254" r="6" fill-opacity="0.42"/>
  </g>

  <!-- packed content blocks (included) -->
  <g fill="url(#s-bar)">
    <rect x="230" y="270" width="44" height="250" rx="6"/>
    <rect x="290" y="230" width="44" height="290" rx="6"/>
    <rect x="350" y="315" width="44" height="205" rx="6"/>
    <rect x="410" y="275" width="44" height="245" rx="6"/>
    <rect x="470" y="345" width="44" height="175" rx="6"/>
    <rect x="530" y="305" width="44" height="215" rx="6"/>
    <rect x="590" y="370" width="44" height="150" rx="6"/>
    <rect x="650" y="330" width="44" height="190" rx="6"/>
    <rect x="710" y="390" width="44" height="130" rx="6"/>
    <rect x="770" y="355" width="44" height="165" rx="6"/>
  </g>

  <!-- dropped blocks (excluded, beyond budget) -->
  <g fill="#cdbfa3" fill-opacity="0.12">
    <rect x="930" y="370" width="44" height="150" rx="6"/>
    <rect x="990" y="405" width="44" height="115" rx="6"/>
    <rect x="1050" y="435" width="44" height="85" rx="6"/>
  </g>
  <g fill="none" stroke="#cdbfa3" stroke-opacity="0.4" stroke-width="2">
    <circle cx="952" cy="254" r="6"/><circle cx="1012" cy="254" r="6"/><circle cx="1072" cy="254" r="6"/>
  </g>
  <g stroke="#cdbfa3" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round">
    <path d="M944 332 l16 16 M960 332 l-16 16"/>
    <path d="M1004 360 l14 14 M1018 360 l-14 14"/>
    <path d="M1064 388 l12 12 M1076 388 l-12 12"/>
  </g>

  <!-- corner ticks -->
  <g stroke="#34d399" stroke-opacity="0.4" stroke-width="2">
    <path d="M128 144 h24 M128 144 v24"/>
    <path d="M1152 576 h-24 M1152 576 v-24"/>
  </g>

  <rect width="1280" height="720" filter="url(#s-grain)" opacity="0.05"/>
</svg>
