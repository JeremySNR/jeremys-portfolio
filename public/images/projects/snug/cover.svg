<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="snug — prioritised content packed to fit a token budget, with lower-priority items excluded">
  <defs>
    <radialGradient id="s-glow" cx="40%" cy="44%" r="58%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <pattern id="s-grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <filter id="s-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#141310"/>
  <rect width="1280" height="720" fill="url(#s-grid)"/>
  <rect width="1280" height="720" fill="url(#s-glow)"/>

  <!-- budget container -->
  <rect x="150" y="170" width="630" height="380" rx="16" fill="#ffffff" fill-opacity="0.02" stroke="#cdbfa3" stroke-opacity="0.5" stroke-width="2"/>

  <!-- budget limit line -->
  <line x1="780" y1="140" x2="780" y2="580" stroke="#34d399" stroke-width="2.5" stroke-dasharray="6 8"/>
  <circle cx="780" cy="140" r="5" fill="#34d399"/>

  <!-- packed bars (included, by priority) -->
  <g>
    <rect x="180" y="250" width="46" height="280" rx="6" fill="#34d399" fill-opacity="0.92"/>
    <rect x="240" y="320" width="46" height="210" rx="6" fill="#2bbf86" fill-opacity="0.9"/>
    <rect x="300" y="210" width="46" height="320" rx="6" fill="#34d399" fill-opacity="0.85"/>
    <rect x="360" y="360" width="46" height="170" rx="6" fill="#1f9e6c" fill-opacity="0.9"/>
    <rect x="420" y="290" width="46" height="240" rx="6" fill="#2bbf86" fill-opacity="0.82"/>
    <rect x="480" y="340" width="46" height="190" rx="6" fill="#1f9e6c" fill-opacity="0.85"/>
    <rect x="540" y="270" width="46" height="260" rx="6" fill="#34d399" fill-opacity="0.8"/>
    <rect x="600" y="380" width="46" height="150" rx="6" fill="#1f9e6c" fill-opacity="0.82"/>
    <rect x="660" y="330" width="46" height="200" rx="6" fill="#2bbf86" fill-opacity="0.78"/>
    <rect x="720" y="410" width="46" height="120" rx="6" fill="#1f9e6c" fill-opacity="0.8"/>
  </g>

  <!-- excluded bars (beyond budget) -->
  <g fill="#cdbfa3" fill-opacity="0.12">
    <rect x="850" y="350" width="46" height="180" rx="6"/>
    <rect x="910" y="400" width="46" height="130" rx="6"/>
    <rect x="970" y="430" width="46" height="100" rx="6"/>
  </g>
  <!-- exclusion crosses -->
  <g stroke="#cdbfa3" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round">
    <path d="M863 300 l20 20 M883 300 l-20 20"/>
    <path d="M923 322 l16 16 M939 322 l-16 16"/>
    <path d="M983 340 l14 14 M997 340 l-14 14"/>
  </g>

  <!-- corner ticks -->
  <g stroke="#34d399" stroke-opacity="0.45" stroke-width="2">
    <path d="M96 96 h26 M96 96 v26"/>
    <path d="M1184 624 h-26 M1184 624 v-26"/>
  </g>

  <rect width="1280" height="720" filter="url(#s-grain)" opacity="0.05"/>
</svg>
